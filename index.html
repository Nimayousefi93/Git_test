<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        /* Slider styles */
        .slider {
            width: 100%;
            max-width: 1000px;
            height: 520px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .slides { position: absolute; inset: 0; }
        .slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
        }
        .slide.active { opacity: 1; }
        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.25), rgba(0,0,0,0.35));
            pointer-events: none;
        }
        .caption {
            position: relative; z-index: 2;
            color: #fff; font-size: 1.6rem; padding: 32px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        .controls { position: absolute; inset: auto 12px 12px 12px; display:flex; justify-content:space-between; z-index:3; }
        .controls button { background: rgba(0,0,0,0.4); color: #fff; border: none; padding: 8px 12px; font-size: 1.4rem; border-radius: 6px; cursor: pointer; }
        .dots { position: absolute; left: 50%; transform: translateX(-50%); bottom: 14px; display:flex; gap:8px; z-index:3; }
        .dots button { width:10px; height:10px; border-radius:50%; border:none; background: rgba(255,255,255,0.5); cursor:pointer; padding:0; }
        .dots button.active { background: #fff; box-shadow: 0 0 0 4px rgba(255,255,255,0.08); }
        @media (max-width:700px){ .slider{height:300px} .caption{font-size:1.1rem;padding:16px} }
    </style>
</head>
<body>
    <header>
        <h1>Hello World</h1>
    </header>
    <main>
        <section class="slider" aria-label="Inspirational photo slider">
            <div class="slides">
                <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80');">
                    <div class="overlay"></div>
                    <div class="caption">Find joy in the journey</div>
                </div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1600&q=80');">
                    <div class="overlay"></div>
                    <div class="caption">Dream big, act bigger</div>
                </div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80');">
                    <div class="overlay"></div>
                    <div class="caption">Courage creates change</div>
                </div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1496307042754-b4aa456c4a2d?auto=format&fit=crop&w=1600&q=80');">
                    <div class="overlay"></div>
                    <div class="caption">Be present. Be grateful.</div>
                </div>
                <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1600&q=80');">
                    <div class="overlay"></div>
                    <div class="caption">Small steps. Big impact.</div>
                </div>
            </div>
            <div class="controls">
                <button class="prev" aria-label="Previous">‹</button>
                <button class="next" aria-label="Next">›</button>
            </div>
            <div class="dots" role="tablist"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Nima. All rights reserved.</p>
    </footer>
    <script>
        (function(){
            const slides = Array.from(document.querySelectorAll('.slide'));
            const dotsContainer = document.querySelector('.dots');
            let idx = 0;
            const interval = 4500;

            // build dots
            slides.forEach((s,i)=>{
                const btn = document.createElement('button');
                btn.setAttribute('aria-label','Slide '+(i+1));
                btn.addEventListener('click',()=>{ show(i); resetTimer(); });
                dotsContainer.appendChild(btn);
            });

            const dotButtons = Array.from(dotsContainer.children);
            function updateDots(){ dotButtons.forEach((b, i)=> b.classList.toggle('active', i===idx)); }

            function show(i){ slides.forEach(s=>s.classList.remove('active')); idx = (i+slides.length)%slides.length; slides[idx].classList.add('active'); updateDots(); }

            document.querySelector('.prev').addEventListener('click', ()=>{ show(idx-1); resetTimer(); });
            document.querySelector('.next').addEventListener('click', ()=>{ show(idx+1); resetTimer(); });

            let timer = setInterval(()=> show(idx+1), interval);
            function resetTimer(){ clearInterval(timer); timer = setInterval(()=> show(idx+1), interval); }

            // initialize
            show(0);
        })();
    </script>
</body>
</html>
